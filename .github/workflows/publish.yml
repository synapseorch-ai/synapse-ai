name: Publish Synapse

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Deploy gate ────────────────────────────────────────────────────────────
  # Runs the fast backend test suite + install checks + version/tag consistency.
  # Every publish job below `needs: gate`, so a single failing test aborts the
  # entire release to PyPI, npm, and Docker Hub.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt

      - name: Verify version matches the release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          NPM=$(python -c "import json,pathlib; print(json.loads(pathlib.Path('package.json').read_text())['version'])")
          echo "tag=$TAG pyproject=$PY package.json=$NPM"
          if [ "$PY" != "$TAG" ] || [ "$NPM" != "$TAG" ]; then
            echo "::error::Version mismatch — tag=$TAG pyproject=$PY package.json=$NPM"
            exit 1
          fi

      - name: Run gate test suite
        run: |
          python -m pytest --junitxml=junit.xml -ra

      - name: Upload gate test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-junit
          path: junit.xml
          if-no-files-found: ignore

  build-frontend:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Next.js standalone
        run: bash scripts/build_frontend.sh

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-builds
          include-hidden-files: true
          path: |
            synapse/_frontend
            frontend-build

  publish-python:
    runs-on: ubuntu-latest
    needs: [gate, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-builds

      - name: Build Python package
        run: |
          pip install hatch
          hatch build

      - name: Verify the built wheel installs and the CLI runs
        # Gate the ACTUAL artifact before it reaches PyPI. --no-deps keeps it fast;
        # the full-dependency install is validated on main by install.yml.
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --upgrade pip
          /tmp/verify/bin/pip install --no-deps dist/*.whl
          /tmp/verify/bin/synapse --help
          /tmp/verify/bin/python -c "import synapse.cli; assert callable(synapse.cli.main)"

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: [gate, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-builds

      - name: Verify tarball hygiene before publish
        run: |
          npm pack
          tgz=$(ls synapse-orch-ai-*.tgz)
          if tar tzf "$tgz" | grep -E '__pycache__|\.pyc$'; then
            echo "::error::npm tarball ships Python bytecode"; exit 1
          fi
          tar tzf "$tgz" | grep -qx package/bin/synapse.js || { echo "::error::missing launcher"; exit 1; }

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push combined image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai-worker:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai-api-server:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/synapse-ai-api-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
